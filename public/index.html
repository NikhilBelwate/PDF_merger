<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Merger</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            silver: {
              200: '#e8e8e8',
              300: '#d4d4d4',
              400: '#c0c0c0',
              500: '#a8a8a8',
              600: '#888888',
              700: '#686868',
            }
          }
        }
      }
    };
  </script>

  <style>
    /* ── Base ─────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    html { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    body { background: #09090b; min-height: 100vh; }

    /* ── Silver metallic button ───────────────────────────────────────────── */
    .btn-silver {
      display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
      padding: 0.625rem 1.375rem;
      border-radius: 0.75rem;
      border: none;
      font-size: 0.875rem;
      font-weight: 600;
      color: #000;
      cursor: pointer;
      transition: all 0.2s ease;
      background: linear-gradient(135deg, #686868 0%, #c8c8c8 45%, #a0a0a0 100%);
      box-shadow: 0 1px 0 rgba(255,255,255,0.15) inset, 0 4px 18px rgba(0,0,0,0.45);
    }
    .btn-silver:hover:not(:disabled) {
      background: linear-gradient(135deg, #828282 0%, #e0e0e0 45%, #bebebe 100%);
      box-shadow: 0 1px 0 rgba(255,255,255,0.2) inset, 0 6px 22px rgba(0,0,0,0.5);
      transform: translateY(-1px);
    }
    .btn-silver:active:not(:disabled) { transform: translateY(0); }
    .btn-silver:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Silver gradient text ─────────────────────────────────────────────── */
    .text-silver-shine {
      background: linear-gradient(135deg, #c0c0c0 0%, #f0f0f0 50%, #a0a0a0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Progress bar shimmer ─────────────────────────────────────────────── */
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }
    .progress-shimmer {
      background: linear-gradient(90deg, #5a5a5a 0%, #b8b8b8 25%, #f0f0f0 50%, #b8b8b8 75%, #5a5a5a 100%);
      background-size: 200% auto;
      animation: shimmer 2s linear infinite;
    }

    /* ── Spinner ──────────────────────────────────────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.75s linear infinite; }

    /* ── Fade-in for file items ───────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0);   }
    }
    .fade-up { animation: fadeUp 0.22s ease forwards; }

    /* ── SortableJS helper classes ────────────────────────────────────────── */
    .sortable-ghost  { opacity: 0.35 !important; }
    .sortable-chosen { box-shadow: 0 0 0 2px rgba(192,192,192,0.35), 0 8px 28px rgba(0,0,0,0.5) !important; }
    .drag-handle     { cursor: grab; touch-action: none; }
    .drag-handle:active { cursor: grabbing; }

    /* ── Scrollbar ────────────────────────────────────────────────────────── */
    ::-webkit-scrollbar       { width: 4px; }
    ::-webkit-scrollbar-track { background: #18181b; }
    ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 99px; }

    /* ── Drop-zone drag-over glow ─────────────────────────────────────────── */
    .dz-hover { box-shadow: 0 0 0 3px rgba(192,192,192,0.15), 0 0 30px rgba(192,192,192,0.06); }
  </style>
</head>

<body>
  <div id="root"></div>

  <!-- React 18 -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <!-- Babel Standalone — transforms JSX in browser -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <!-- SortableJS — drag-to-reorder -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>

  <!-- ─── Application ─────────────────────────────────────────────────────── -->
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    /* ── Utilities ──────────────────────────────────────────────────────────── */

    function formatBytes(bytes) {
      if (!bytes) return '0 B';
      const k = 1024, sizes = ['B','KB','MB','GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return `${(bytes / Math.pow(k, i)).toFixed(1)} ${sizes[i]}`;
    }

    /* ── Icons (shared SVG helpers) ─────────────────────────────────────────── */

    const UploadIcon = () => (
      <svg className="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
    );

    const MergeIcon = () => (
      <svg className="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
        <path d="M8 6H5a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-3"/>
        <polyline points="15 3 12 6 9 3"/>
        <line x1="12" y1="6" x2="12" y2="13"/>
      </svg>
    );

    const SpinnerIcon = () => (
      <svg className="h-4 w-4 spin" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="3" strokeOpacity="0.25"/>
        <path fill="currentColor" strokeOpacity="0.75" d="M4 12a8 8 0 0 1 8-8V0C5.373 0 0 5.373 0 12h4z"/>
      </svg>
    );

    /* ── StatusBar component ─────────────────────────────────────────────────── */

    function StatusBar({ status, onDismiss }) {
      if (!status) return null;

      const configs = {
        info:    { wrap: 'bg-zinc-800/80 border-zinc-700 text-zinc-300', icon: 'text-silver-400',  sym: 'ℹ' },
        success: { wrap: 'bg-emerald-950/70 border-emerald-800/60 text-emerald-300', icon: 'text-emerald-400', sym: '✓' },
        error:   { wrap: 'bg-red-950/70 border-red-800/60 text-red-300',             icon: 'text-red-400',     sym: '✕' },
        warning: { wrap: 'bg-amber-950/70 border-amber-800/60 text-amber-300',       icon: 'text-amber-400',   sym: '⚠' },
      };
      const c = configs[status.type] || configs.info;

      return (
        <div className={`mt-3 flex items-center gap-2.5 rounded-xl border px-3.5 py-2.5 text-sm ${c.wrap}`}>
          <span className={`flex-shrink-0 font-bold ${c.icon}`}>{c.sym}</span>
          <span className="flex-1 leading-snug">{status.message}</span>
          {onDismiss && (
            <button onClick={onDismiss}
              className="flex-shrink-0 rounded p-0.5 opacity-50 transition-opacity hover:opacity-100 focus:outline-none">
              <svg className="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          )}
        </div>
      );
    }

    /* ── ProgressBar component ───────────────────────────────────────────────── */

    function ProgressBar({ label, pct }) {
      return (
        <div className="mt-4 rounded-xl border border-zinc-700 bg-zinc-800/60 px-4 py-3">
          <div className="mb-2 flex items-center justify-between">
            <span className="text-xs font-medium text-zinc-400">{label}</span>
            <span className="text-xs font-bold text-silver-400">{Math.round(pct)}%</span>
          </div>
          <div className="h-1.5 overflow-hidden rounded-full bg-zinc-700">
            <div className="progress-shimmer h-full rounded-full"
              style={{ width: `${pct}%`, transition: 'width 0.45s ease' }} />
          </div>
        </div>
      );
    }

    /* ── Header component ────────────────────────────────────────────────────── */

    function Header() {
      return (
        <header className="relative mb-5 overflow-hidden rounded-2xl border border-zinc-800 bg-zinc-900 p-6">
          {/* Subtle radial glow */}
          <div className="pointer-events-none absolute inset-0"
            style={{ background: 'radial-gradient(ellipse 60% 60% at 0% 0%, rgba(192,192,192,0.06) 0%, transparent 70%)' }} />

          <div className="relative flex flex-wrap items-center gap-4">
            {/* Logo mark */}
            <div className="flex h-[54px] w-[54px] flex-shrink-0 items-center justify-center rounded-2xl border border-zinc-700"
              style={{ background: 'linear-gradient(145deg, #2c2c2c 0%, #181818 100%)' }}>
              <svg className="h-7 w-7" viewBox="0 0 24 24" fill="none" strokeWidth="1.7"
                strokeLinecap="round" strokeLinejoin="round" stroke="url(#logoGrad)">
                <defs>
                  <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%"   stopColor="#787878"/>
                    <stop offset="50%"  stopColor="#d0d0d0"/>
                    <stop offset="100%" stopColor="#a0a0a0"/>
                  </linearGradient>
                </defs>
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="12" y1="18" x2="12" y2="12"/>
                <line x1="9"  y1="15" x2="15" y2="15"/>
              </svg>
            </div>

            {/* Title */}
            <div>
              <h1 className="text-[1.6rem] font-bold leading-tight tracking-tight">
                <span className="text-silver-shine">PDF</span>
                <span className="text-zinc-100"> Merger</span>
              </h1>
              <p className="mt-0.5 text-sm text-zinc-500">
                Upload, arrange &amp; merge PDFs — files are deleted after download.
              </p>
            </div>

            {/* Badge */}
            <div className="ml-auto hidden sm:flex items-center gap-1.5 rounded-full border border-zinc-700 bg-zinc-800 px-3 py-1.5">
              <span className="h-1.5 w-1.5 rounded-full bg-emerald-400" style={{ boxShadow: '0 0 6px rgba(52,211,153,0.6)' }} />
              <span className="text-xs font-medium text-zinc-400">Secure &amp; private</span>
            </div>
          </div>
        </header>
      );
    }

    /* ── DropZone component ──────────────────────────────────────────────────── */

    function DropZone({ onFiles, disabled }) {
      const [isDragOver, setIsDragOver] = useState(false);
      const inputRef = useRef(null);

      function handleDragOver(e)  { e.preventDefault(); if (!disabled) setIsDragOver(true); }
      function handleDragLeave()  { setIsDragOver(false); }
      function handleDrop(e) {
        e.preventDefault(); setIsDragOver(false);
        if (!disabled && e.dataTransfer.files.length) onFiles([...e.dataTransfer.files]);
      }
      function handleChange(e) {
        if (e.target.files.length) { onFiles([...e.target.files]); e.target.value = ''; }
      }

      const active = isDragOver && !disabled;

      return (
        <div onDragOver={handleDragOver} onDragLeave={handleDragLeave} onDrop={handleDrop}
          onClick={() => !disabled && inputRef.current?.click()}
          className={[
            'relative select-none rounded-xl border-2 border-dashed p-8 text-center',
            'transition-all duration-200',
            active
              ? 'border-silver-400 bg-zinc-800 dz-hover'
              : 'border-zinc-700 bg-zinc-800/40 hover:border-zinc-600 hover:bg-zinc-800/70',
            disabled ? 'cursor-not-allowed opacity-50' : 'cursor-pointer',
          ].join(' ')}>

          <input ref={inputRef} type="file" accept=".pdf,application/pdf"
            multiple className="sr-only" onChange={handleChange} disabled={disabled} />

          {/* Icon circle */}
          <div className={[
            'mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-full border transition-all duration-200',
            active ? 'border-silver-500/50 bg-zinc-700' : 'border-zinc-700 bg-zinc-800/80',
          ].join(' ')}>
            <svg className={`h-6 w-6 transition-colors ${active ? 'text-silver-300' : 'text-zinc-500'}`}
              viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
          </div>

          <p className={`text-sm font-semibold transition-colors ${active ? 'text-silver-300' : 'text-zinc-300'}`}>
            {active ? 'Drop your PDF files here' : 'Drag & drop PDF files here'}
          </p>
          <p className="mt-1 text-xs text-zinc-600">or click to browse from your computer</p>

          {/* Constraint pill */}
          <div className="mt-4 inline-flex items-center gap-1.5 rounded-full px-3 py-1"
            style={{ background: 'rgba(69,10,10,0.45)', border: '1px solid rgba(127,29,29,0.45)' }}>
            <svg className="h-3 w-3 text-red-400" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 22C6.48 22 2 17.52 2 12S6.48 2 12 2s10 4.48 10 10-4.48 10-10 10zm-1-7v2h2v-2h-2zm0-8v6h2V7h-2z"/>
            </svg>
            <span className="text-xs font-semibold text-red-400">PDF only · Max 100 MB per file · Up to 30 files</span>
          </div>
        </div>
      );
    }

    /* ── FileItem component ──────────────────────────────────────────────────── */

    function FileItem({ file, index, onRemove, disabled }) {
      return (
        <div
          className="file-item fade-up group flex items-center gap-3 rounded-xl border border-zinc-700/80 bg-zinc-800 px-4 py-3 transition-all duration-150 hover:border-zinc-600"
          data-id={file.id}
        >

          {/* Drag handle */}
          <span className="drag-handle flex-shrink-0 rounded-lg p-1.5 text-zinc-600 transition-colors hover:text-zinc-400" title="Drag to reorder">
            <svg className="h-4 w-4" viewBox="0 0 24 24" fill="currentColor">
              <circle cx="9"  cy="5"  r="1.3"/><circle cx="9"  cy="12" r="1.3"/><circle cx="9"  cy="19" r="1.3"/>
              <circle cx="15" cy="5"  r="1.3"/><circle cx="15" cy="12" r="1.3"/><circle cx="15" cy="19" r="1.3"/>
            </svg>
          </span>

          {/* PDF badge */}
          <div className="flex h-9 w-9 flex-shrink-0 items-center justify-center rounded-lg"
            style={{ background: 'linear-gradient(135deg, #7f1d1d, #991b1b)' }}>
            <svg className="h-[18px] w-[18px] text-red-200" viewBox="0 0 24 24" fill="currentColor">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6z"/>
              <polyline points="14 2 14 8 20 8" fill="none" stroke="#fecaca" strokeWidth="1.5"/>
            </svg>
          </div>

          {/* Info */}
          <div className="min-w-0 flex-1">
            <p className="truncate text-sm font-medium text-zinc-200" title={file.name}>{file.name}</p>
            <p className="mt-0.5 text-xs text-zinc-500">{file.sizeFormatted}</p>
          </div>

          {/* Sequence badge */}
          <span className="flex-shrink-0 rounded-full border border-zinc-700 bg-zinc-900 px-2.5 py-0.5 text-xs font-semibold text-zinc-400">
            #{index + 1}
          </span>

          {/* Remove */}
          <button onClick={() => !disabled && onRemove(file.id)} disabled={disabled} title="Remove file"
            className="flex-shrink-0 rounded-lg p-1.5 text-zinc-600 opacity-0 transition-all group-hover:opacity-100 hover:bg-red-950/60 hover:text-red-400 disabled:cursor-not-allowed focus:outline-none">
            <svg className="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
      );
    }

    /* ── FileList component (SortableJS integration) ─────────────────────────── */

    function FileList({ files, setFiles, onRemove, disabled }) {
      const listRef  = useRef(null);
      const sortableRef = useRef(null);
      const filesRef = useRef(files); // Always-fresh reference for SortableJS callback

      // Keep ref in sync with state
      useEffect(() => { filesRef.current = files; }, [files]);

      // Initialize SortableJS once — use filesRef so onEnd always sees current order
      useEffect(() => {
        if (!listRef.current) return;
        const sortable = Sortable.create(listRef.current, {
          animation:   200,
          handle:      '.drag-handle',
          ghostClass:  'sortable-ghost',
          chosenClass: 'sortable-chosen',
          disabled:    !!disabled,
          onEnd({ oldIndex, newIndex }) {
            if (oldIndex === newIndex) return;
            const next = [...filesRef.current];
            const [moved] = next.splice(oldIndex, 1);
            next.splice(newIndex, 0, moved);
            setFiles(next);   // setFiles from useState is stable — safe to close over
          },
        });
        sortableRef.current = sortable;
        return () => {
          sortableRef.current = null;
          sortable.destroy();
        };
      }, []); // eslint-disable-line react-hooks/exhaustive-deps

      // Keep SortableJS enabled/disabled in sync with app state
      useEffect(() => {
        if (sortableRef.current) sortableRef.current.option('disabled', !!disabled);
      }, [disabled]);

      if (files.length === 0) {
        return (
          <div className="flex flex-col items-center justify-center py-12 text-center">
            <div className="mb-3 flex h-12 w-12 items-center justify-center rounded-full border border-zinc-800 bg-zinc-900">
              <svg className="h-5 w-5 text-zinc-700" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6z"/>
                <polyline points="14 2 14 8 20 8"/>
              </svg>
            </div>
            <p className="text-sm text-zinc-600">No PDFs uploaded yet.</p>
            <p className="mt-0.5 text-xs text-zinc-700">Upload files above to get started.</p>
          </div>
        );
      }

      return (
        <div ref={listRef} className="flex flex-col gap-2">
          {files.map((file, idx) => (
            <FileItem key={file.id} file={file} index={idx} onRemove={onRemove} disabled={disabled} />
          ))}
        </div>
      );
    }

    /* ── DownloadCard component ──────────────────────────────────────────────── */

    function DownloadCard({ result, onNewSession }) {
      return (
        <div className="rounded-2xl border border-zinc-800 bg-zinc-900 p-8 text-center">
          {/* Success icon */}
          <div className="mx-auto mb-5 flex h-[76px] w-[76px] items-center justify-center rounded-full"
            style={{ background: 'rgba(6,78,59,0.35)', border: '1px solid rgba(6,78,59,0.55)' }}>
            <svg className="h-9 w-9 text-emerald-400" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>

          <h2 className="mb-2 text-2xl font-bold text-zinc-100">Merged PDF is ready!</h2>
          <p className="mx-auto mb-6 max-w-sm text-sm leading-relaxed text-zinc-500">
            Your download has started. This was a one-time link — all uploaded and merged files have
            been permanently deleted from the server.
          </p>

          {/* Stats */}
          {result && (
            <div className="mx-auto mb-6 inline-flex divide-x divide-zinc-700 overflow-hidden rounded-xl border border-zinc-700 bg-zinc-800">
              <div className="flex flex-col items-center px-7 py-3.5">
                <span className="text-xl font-bold text-silver-shine">{result.pageCount || '—'}</span>
                <span className="mt-0.5 text-xs text-zinc-500">Total pages</span>
              </div>
              <div className="flex flex-col items-center px-7 py-3.5">
                <span className="text-xl font-bold text-silver-shine">{result.sizeFormatted || '—'}</span>
                <span className="mt-0.5 text-xs text-zinc-500">File size</span>
              </div>
            </div>
          )}

          {/* Security note */}
          <div className="mx-auto mb-6 flex max-w-xs items-center justify-center gap-2 rounded-xl border border-zinc-800 bg-zinc-800/40 px-4 py-2.5">
            <svg className="h-3.5 w-3.5 flex-shrink-0 text-zinc-600" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <span className="text-xs text-zinc-600">All files securely deleted after download</span>
          </div>

          <button onClick={onNewSession} className="btn-silver">
            <svg className="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="1 4 1 10 7 10"/>
              <path d="M3.51 15a9 9 0 1 0 .49-4.5"/>
            </svg>
            Merge More PDFs
          </button>
        </div>
      );
    }

    /* ── App (main state + logic) ────────────────────────────────────────────── */

    function App() {
      // ── State ──────────────────────────────────────────────────────────────
      const [sessionId,   setSessionId]   = useState(null);
      const [files,       setFiles]       = useState([]);
      const [isBusy,      setIsBusy]      = useState(false);
      const [status,      setStatus]      = useState(null);   // { type, message }
      const [progress,    setProgress]    = useState(null);   // { label, pct }
      const [phase,       setPhase]       = useState('upload'); // 'upload' | 'success'
      const [mergeResult, setMergeResult] = useState(null);   // { pageCount, sizeFormatted }

      // Refs for stable values in async / side-effect contexts
      const sessionIdRef  = useRef(null);
      const statusTimerRef = useRef(null);

      function setSessionIdBoth(val) {
        sessionIdRef.current = val;
        setSessionId(val);
      }

      // ── Status helpers ──────────────────────────────────────────────────────
      function showStatus(type, message, autoDismissMs = 0) {
        if (statusTimerRef.current) clearTimeout(statusTimerRef.current);
        setStatus({ type, message });
        if (autoDismissMs > 0) {
          statusTimerRef.current = setTimeout(() => setStatus(null), autoDismissMs);
        }
      }

      // ── Client-side PDF validation ──────────────────────────────────────────
      function validatePDFs(fileArray) {
        const accepted = [], rejected = [];
        for (const f of fileArray) {
          (f.name.toLowerCase().endsWith('.pdf') || f.type === 'application/pdf')
            ? accepted.push(f)
            : rejected.push(f.name);
        }
        if (rejected.length) {
          showStatus('error',
            `Rejected ${rejected.length} non-PDF file${rejected.length > 1 ? 's' : ''}: ${rejected.slice(0, 3).join(', ')}${rejected.length > 3 ? ' …' : ''}`,
            7000
          );
        }
        return accepted;
      }

      // ── Upload ──────────────────────────────────────────────────────────────
      async function uploadFiles(fileArray) {
        const valid = validatePDFs(fileArray);
        if (!valid.length) return;

        if (files.length + valid.length > 30) {
          showStatus('warning', 'Maximum 30 files per session. Remove some first.', 4000);
          return;
        }

        setIsBusy(true);
        setProgress({ label: 'Uploading…', pct: 5 });

        const formData = new FormData();
        valid.forEach(f => formData.append('pdfs', f));

        try {
          const xhr = new XMLHttpRequest();
          xhr.open('POST', '/upload');
          if (sessionIdRef.current) xhr.setRequestHeader('x-session-id', sessionIdRef.current);

          xhr.upload.addEventListener('progress', e => {
            if (e.lengthComputable)
              setProgress({ label: 'Uploading…', pct: (e.loaded / e.total) * 90 });
          });

          const result = await new Promise((resolve, reject) => {
            xhr.onload  = () => { try { resolve(JSON.parse(xhr.responseText)); } catch { reject(new Error('Invalid response from server')); } };
            xhr.onerror = () => reject(new Error('Network error'));
            xhr.send(formData);
          });

          setProgress({ label: 'Processing…', pct: 100 });
          if (!result.success) throw new Error(result.error || 'Upload failed');

          setSessionIdBoth(result.sessionId);
          setFiles(prev => [...prev, ...result.files]);
          showStatus('success', `${result.files.length} file${result.files.length !== 1 ? 's' : ''} uploaded successfully.`, 3500);

        } catch (err) {
          showStatus('error', 'Upload failed: ' + err.message);
        } finally {
          setIsBusy(false);
          setProgress(null);
        }
      }

      // ── Remove file ─────────────────────────────────────────────────────────
      async function removeFile(fileId) {
        if (isBusy) return;
        if (sessionIdRef.current) {
          try {
            const res = await fetch(`/file/${sessionIdRef.current}/${fileId}`, { method: 'DELETE' });
            if (!res.ok) {
              const d = await res.json().catch(() => ({}));
              throw new Error(d.error || 'Remove failed');
            }
          } catch (err) {
            showStatus('error', 'Failed to remove: ' + err.message, 4000);
            return;
          }
        }
        setFiles(prev => {
          const updated = prev.filter(f => f.id !== fileId);
          if (updated.length === 0) setStatus(null);
          return updated;
        });
      }

      // ── Clear all ───────────────────────────────────────────────────────────
      function clearAll() {
        if (!window.confirm('Remove all uploaded files from this session?')) return;
        if (sessionIdRef.current) {
          files.forEach(f =>
            fetch(`/file/${sessionIdRef.current}/${f.id}`, { method: 'DELETE' }).catch(() => {})
          );
        }
        setFiles([]);
        setSessionIdBoth(null);
        setStatus(null);
      }

      // ── Merge ───────────────────────────────────────────────────────────────
      async function mergePDFs() {
        if (files.length < 2) {
          showStatus('warning', 'Upload at least 2 PDF files to merge.', 3000);
          return;
        }

        const fileOrder = files.map(f => f.id);
        setIsBusy(true);
        setStatus(null);
        setProgress({ label: 'Merging PDFs…', pct: 20 });

        try {
          const res = await fetch('/merge', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ sessionId: sessionIdRef.current, fileOrder }),
          });

          setProgress({ label: 'Finalising…', pct: 80 });
          const data = await res.json();
          setProgress({ label: 'Complete!', pct: 100 });

          if (!data.success) throw new Error(data.error || 'Merge failed');

          // Trigger one-time download
          const a = document.createElement('a');
          a.href = `/download/${data.token}`;
          a.download = 'merged.pdf';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);

          setMergeResult({ pageCount: data.pageCount, sizeFormatted: data.sizeFormatted });
          setPhase('success');
          setFiles([]);
          setSessionIdBoth(null);

        } catch (err) {
          showStatus('error', 'Merge failed: ' + err.message);
        } finally {
          setIsBusy(false);
          setProgress(null);
        }
      }

      // ── New session ─────────────────────────────────────────────────────────
      function startNewSession() {
        setFiles([]);
        setSessionIdBoth(null);
        setStatus(null);
        setProgress(null);
        setMergeResult(null);
        setPhase('upload');
        setIsBusy(false);
      }

      // ── Derived ─────────────────────────────────────────────────────────────
      const totalSize = formatBytes(files.reduce((a, f) => a + f.size, 0));
      const canMerge  = files.length >= 2 && !isBusy;
      const canClear  = files.length > 0 && !isBusy;

      /* ── Render ─────────────────────────────────────────────────────────── */
      return (
        <div className="min-h-screen bg-zinc-950 text-zinc-100">
          <div className="mx-auto max-w-2xl px-4 py-8 pb-24">

            <Header />

            {/* ── Success screen ──────────────────────────────────────── */}
            {phase === 'success' ? (
              <DownloadCard result={mergeResult} onNewSession={startNewSession} />

            ) : (
              <>
                {/* ── Upload card ──────────────────────────────────────── */}
                <div className="mb-4 rounded-2xl border border-zinc-800 bg-zinc-900 p-6">
                  <div className="mb-4 flex items-center gap-2">
                    <UploadIcon />
                    <span className="text-xs font-semibold uppercase tracking-widest text-zinc-500">Upload PDFs</span>
                  </div>

                  <DropZone onFiles={uploadFiles} disabled={isBusy} />

                  {progress && <ProgressBar label={progress.label} pct={progress.pct} />}
                  {status    && <StatusBar  status={status}         onDismiss={() => setStatus(null)} />}
                </div>

                {/* ── File list card ───────────────────────────────────── */}
                <div className="rounded-2xl border border-zinc-800 bg-zinc-900 p-6">

                  {/* Card header */}
                  <div className="mb-4 flex items-center justify-between">
                    <div className="flex items-center gap-2">
                      <svg className="h-3.5 w-3.5 text-zinc-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
                        <line x1="8"  y1="6"  x2="21" y2="6"/><line x1="8"  y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
                        <line x1="3"  y1="6"  x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
                      </svg>
                      <span className="text-xs font-semibold uppercase tracking-widest text-zinc-500">Merge Order</span>
                      <span className="rounded-full border border-zinc-700 bg-zinc-800 px-2 py-0.5 text-xs font-bold text-zinc-400">
                        {files.length}
                      </span>
                    </div>
                    {files.length > 0 && (
                      <span className="text-xs text-zinc-600">{totalSize} · drag ⠿ to reorder</span>
                    )}
                  </div>

                  {/* Sortable list */}
                  <FileList files={files} setFiles={setFiles} onRemove={removeFile} disabled={isBusy} />

                  {/* Divider */}
                  <div className="my-5 border-t border-zinc-800" />

                  {/* Action row */}
                  <div className="flex flex-wrap items-center justify-between gap-3">

                    {/* Clear All */}
                    <button onClick={clearAll} disabled={!canClear}
                      className="inline-flex items-center gap-2 rounded-xl border px-4 py-2.5 text-sm font-semibold transition-all duration-150"
                      style={{
                        background: canClear ? 'rgba(69,10,10,0.35)' : 'rgba(39,39,42,0.5)',
                        borderColor: canClear ? 'rgba(127,29,29,0.5)' : 'rgba(39,39,42,0.8)',
                        color: canClear ? '#f87171' : '#52525b',
                        cursor: canClear ? 'pointer' : 'not-allowed',
                      }}>
                      <svg className="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                        <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
                      </svg>
                      Clear All
                    </button>

                    {/* Merge PDFs */}
                    <button onClick={mergePDFs} disabled={!canMerge} className="btn-silver" style={{ minWidth: '148px' }}>
                      {isBusy ? <><SpinnerIcon /> Merging…</> : <><MergeIcon /> Merge PDFs</>}
                    </button>
                  </div>

                  {files.length === 1 && (
                    <p className="mt-3 text-center text-xs text-zinc-700">
                      Upload at least one more PDF to enable merging.
                    </p>
                  )}
                </div>
              </>
            )}
          </div>
        </div>
      );
    }

    /* ── Mount ──────────────────────────────────────────────────────────────── */
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
